<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semester Courses</title>
  <style>
    @keyframes slideDown {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .top-header {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 20px 0;
      font-size: 28px;
      font-weight: bold;
      animation: slideDown 0.7s ease-out;
    }

    h1 {
      margin: 30px 0 10px;
      text-align: center;
      color: #2c3e50;
    }

    .grid-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      margin-bottom: 30px;
    }

    .semester-block {
      background-color: white;
      padding: 20px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }

    .semester-title {
      font-size: 22px;
      margin-bottom: 20px;
      color: #003366;
      text-align: center;
      font-weight: bold;
    }

    .course-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .course-button {
      background-color: #003366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
      width: 90%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    .course-button:hover {
      background-color: #002244;
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      .semester-block {
        width: 100%;
        max-width: 400px;
      }

      .grid-row {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="top-header">
    Course Guide
  </div>

  <h1>B Tech - Mechanical Engineering</h1>

  <!-- First Row: Semester I and III -->
  <div class="grid-row">
    <div class="semester-block">
      <div class="semester-title">Semester II</div>
      <div class="course-buttons">
        <button class="course-button">Introduction to Fundamental and Applied Chemistry-II</button>
        <a class="course-button" href="Calculus CSE UG.html" target="_blank">Engineering Thermodynamics</a>
        <button class="course-button">Solid Mechanics</button>
       <a class="course-button" href="Computer Systems and programming CSE UG.html" target="_blank">Data Structures and Algorithms</a>
        <button class="course-button">Linear Algebra and Differential Equations</button>
        <a class="course-button" href="Entrepreneurship 101 CIV UG.html" target="_blank">Design Thinking</a>
      </div>
    </div>

    <div class="semester-block">
      <div class="semester-title">Semester IV</div>
      <div class="course-buttons">
        <a class="course-button" href="Fluid Dynamics CIV UG.html" target="_blank">Biology</a>
        <a class="course-button" href="Manufacturing Process 1.html" target="_blank">Engineering Standards</a>
        <a class="course-button" href="Fluid Dynamics CIV UG.html" target="_blank">Heat Transfer</a>
        <button class="course-button">Kinematics and Dynamics of Machines</button>
        <button class="course-button">Manufacturing Processes-II</button>
        <a class="course-button" href="Numerical Methods CSE UG.html" target="_blank">Design Thinking</a>
      </div>
    </div>
  </div>

  <!-- Second Row: Semester V and VII -->
  <div class="grid-row">
    <div class="semester-block">
      <div class="semester-title">Semester VI</div>
      <div class="course-buttons">
        <button class="course-button">Introduction to Operations Research</button>
         <a class="course-button" href="Machine design.html" target="_blank">Control Engineering</a>
        <a class="course-button" href="Manufacturing System Design.html" target="_blank">Mechanical Drawing</a>
        <button class="course-button">Differential Equations for Engineers and Scientists</button>
		  <button class="course-button">Medical Devices Manufacturing</button>
      </div>
    </div>

    <div class="semester-block">
      <div class="semester-title">Semester VIII</div>
      <div class="course-buttons">
        <button class="course-button">Differential Equations for Engineers and Scientists</button>
        <button class="course-button">Medical Devices Manufacturing</button>
        <button class="course-button">Abrasive Machining and Finishing</button>
        <button class="course-button">Fracture Mechanics</button>
        <button class="course-button">Fundamentals of Tribology</button>
        <button class="course-button">Powder Bed Fusion AM</button>
		  <button class="course-button">Design for Additive Manufacturing</button>
		  <button class="course-button">Mechatronics for Manufacturing</button>
		  <button class="course-button">Instabilities and Turbulence in Fluid Flows</button>
		  <button class="course-button">Introduction to combustion</button>
		  <button class="course-button">Computational Fluid Dynamics</button>
		  <button class="course-button">Decision Theory and Optimization</button>
      </div>
    </div>
  </div>

</body>
</html>

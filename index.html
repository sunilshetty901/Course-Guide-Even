<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Course Guide – Mini OPAC</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: linear-gradient(180deg, #f8fafc, #eef2f7);
  color: #1f2937;
}

header {
  position: relative;
  background: radial-gradient(circle at top, #004080 0%, #001f4d 100%);
  color: white;
  padding: 90px 20px 70px;
  text-align: center;
  border-bottom: 6px solid #00b4d8;
}

header h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: 4.2rem;
  letter-spacing: 3px;
  margin: 0;
  animation: fadeInUp 0.8s ease-out;
}

header p {
  font-size: 1.25rem;
  color: #dbeafe;
  margin-top: 10px;
  animation: fadeInUp 1.2s ease-out;
}

.opac-search {
  position: absolute;
  top: 30px;
  right: 30px;
  width: 340px;
}

.opac-search input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 10px;
  border: none;
  font-size: 0.95rem;
  outline: none;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

.container {
  max-width: 1600px;
  margin: auto;
  padding: 50px 25px;
}

.row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 32px;
  margin-bottom: 40px;
}

.section {
  background: linear-gradient(180deg, #ffffff, #f8fafc);
  border-radius: 28px;
  padding: 34px 30px;
  border: 3px solid rgba(0,84,144,0.25);
  box-shadow: 0 14px 34px rgba(0,0,0,0.10);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  animation: fadeInUp 0.6s ease both;
}

.section:hover {
  transform: translateY(-8px);
  box-shadow: 0 22px 48px rgba(0,0,0,0.18);
}

.section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2.1rem;
  margin-bottom: 28px;
  color: #002147;
  border-left: 6px solid #005490;
  padding-left: 16px;
}

.tools {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.tool {
  flex: 1 1 45%;
  background: linear-gradient(135deg, #003f7f, #005fa3);
  border-radius: 18px;
  padding: 22px 18px;
  text-align: center;
  box-shadow: 0 10px 22px rgba(0,63,127,0.35);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.tool:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 16px 34px rgba(0,63,127,0.5);
}

.tool img {
  width: 54px;
  margin-bottom: 14px;
}

.tool a {
  display: block;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.15rem;
  color: #ffffff;
}

footer {
  background: #e2e8f0;
  text-align: center;
  padding: 22px;
  font-size: 0.9rem;
  color: #475569;
}

@media (max-width: 900px) {
  .row {
    grid-template-columns: 1fr;
  }
  .opac-search {
    position: static;
    width: 90%;
    margin: 30px auto 0;
  }
}
</style>
</head>

<body>

<header>
  <h1>COURSE GUIDE</h1>
  <p>Mini OPAC for Library Resources</p>

  <div class="opac-search">
    <input type="text" id="opacSearch" placeholder="Search course, subject, book...">
  </div>
</header>

<div class="container">

<!-- Your department sections remain SAME -->
<!-- (No change in your rows and sections content) -->

</div>

<footer>
  &copy; 2025 Course Guide · Library Portal
</footer>

<script>
let searchData = [];

// Load JSON
async function loadSearchIndex() {
  try {
    const response = await fetch("search-index.json");
    searchData = await response.json();
  } catch (error) {
    console.error("Search index failed:", error);
  }
}

loadSearchIndex();

const searchInput = document.getElementById("opacSearch");

// Create dropdown
const resultsBox = document.createElement("div");
resultsBox.style.position = "absolute";
resultsBox.style.top = "60px";
resultsBox.style.width = "100%";
resultsBox.style.background = "#ffffff";
resultsBox.style.borderRadius = "10px";
resultsBox.style.boxShadow = "0 10px 30px rgba(0,0,0,0.2)";
resultsBox.style.display = "none";
resultsBox.style.zIndex = "999";
resultsBox.style.maxHeight = "300px";
resultsBox.style.overflowY = "auto";

document.querySelector(".opac-search").appendChild(resultsBox);

// Search logic
searchInput.addEventListener("input", function () {
  const query = this.value.toLowerCase().trim();
  resultsBox.innerHTML = "";

  if (query.length < 2) {
    resultsBox.style.display = "none";
    return;
  }

  const matches = searchData.filter(item =>
    item.title.toLowerCase().includes(query) ||
    item.course.toLowerCase().includes(query) ||
    item.department.toLowerCase().includes(query)
  );

  if (matches.length === 0) {
    resultsBox.innerHTML = "<div style='padding:12px;'>No records found</div>";
  } else {
    matches.forEach(item => {
      const div = document.createElement("div");
      div.style.padding = "12px";
      div.style.cursor = "pointer";
      div.style.borderBottom = "1px solid #eee";
      div.innerHTML = `
        <strong>${item.title}</strong><br>
        <small>${item.course} – ${item.department}</small>
      `;
      div.onclick = () => window.open(item.url, "_blank");
      resultsBox.appendChild(div);
    });
  }

  resultsBox.style.display = "block";
});

// Close dropdown when clicking outside
document.addEventListener("click", function(e) {
  if (!document.querySelector(".opac-search").contains(e.target)) {
    resultsBox.style.display = "none";
  }
});
</script>

</body>
</html>

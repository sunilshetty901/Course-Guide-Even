<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Course Materials</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: #f4f6f8;
  margin: 0;
  padding: 40px 20px;
  color: #1f2937;
}

h1 {
  text-align: center;
  color: #003366;
  margin-bottom: 40px;
}

.section { margin-bottom: 50px; }

.block {
  background: #ffffff;
  border-radius: 18px;
  padding: 32px 24px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
  max-width: 900px;
  margin: auto;
}

.section-title {
  font-size: 24px;
  color: #003366;
  margin-bottom: 30px;
  text-align: center;
}

.book-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.book-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: #003366;
  color: white;
  padding: 18px 22px;
  border-radius: 14px;
  font-size: 15px;
  flex-wrap: wrap;
}

.book-title {
  flex: 1 1 60%;
  display: flex;
  align-items: center;
  gap: 16px;
}

.book-icon {
  width: 90px;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

.action-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.action-button {
  background: white;
  color: #003366;
  border-radius: 999px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
}

.availability {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #ffdd57;
}
</style>
</head>

<body>

<h1>Course Materials</h1>

<div class="section block">
<div class="section-title">Textbooks</div>

<ul class="book-list">

<li class="book-item">
<div class="book-title">
Introduction to VLSI Design Flow by S. Saurabh
</div>

<div class="action-buttons">
<a class="action-button" href="https://libopac.iitjammu.ac.in/cgi-bin/koha/opac-detail.pl?biblionumber=2340" target="_blank">Check Availability</a>
</div>

<div id="status-2340" class="availability">Checking availability...</div>
</li>

<li class="book-item">
<div class="book-title">
Verilog HDL: a guide to digital design and synthesis by S. Palnitkar
</div>

<div class="action-buttons">
<a class="action-button" href="https://libopac.iitjammu.ac.in/cgi-bin/koha/opac-detail.pl?biblionumber=748" target="_blank">Check Availability</a>
</div>

<div id="status-748" class="availability">Checking availability...</div>
</li>

</ul>
</div>

<!-- SCRIPT PLACED BEFORE BODY CLOSE -->
<script>

const kohaBaseURL = "https://libopac.iitjammu.ac.in/api/v1/biblios/";

function fetchAvailability(biblioNumber) {

fetch(`${kohaBaseURL}${biblioNumber}/items`)
.then(response => response.json())
.then(data => {

let total = data.length;

let available = data.filter(item =>
item.checked_out_date === null &&
item.not_for_loan === 0 &&
item.lost === 0 &&
item.withdrawn === 0
).length;

document.getElementById(`status-${biblioNumber}`).innerHTML =
`Total Copies: ${total} | Available: ${available}`;

})
.catch(error => {
document.getElementById(`status-${biblioNumber}`).innerHTML =
"Availability data not accessible";
});
}

fetchAvailability(2340);
fetchAvailability(748);

</script>

</body>
</html>

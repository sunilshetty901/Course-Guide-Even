<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Guide – Civil Engineering</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #003366;
      --secondary: #0055aa;
      --accent: #00b4d8;
      --bg: #f1f5f9;
      --card-bg: rgba(255, 255, 255, 0.85);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #eef3f8, #ffffff);
      color: #1f2933;
    }

    /* HEADER */
    .top-header {
      position: relative;
      background: linear-gradient(135deg, #003366, #0055aa);
      color: white;
      padding: 28px 20px;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* LOGO */
    .logo {
      position: absolute;
      top: 18px;
      right: 25px;
      height: 55px;
    }

    h1 {
      text-align: center;
      margin: 35px 0 25px;
      font-weight: 600;
      color: #003366;
    }

    /* GRID */
    .grid-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 35px;
      margin-bottom: 40px;
      padding: 0 20px;
    }

    /* SEMESTER CARD */
    .semester-block {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .semester-block:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.18);
    }

    .semester-title {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 22px;
      position: relative;
    }

    .semester-title::after {
      content: "";
      display: block;
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      margin: 10px auto 0;
      border-radius: 5px;
    }

    /* BUTTONS */
    .course-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .course-button {
      text-decoration: none;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 500;
      color: white;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 8px 18px rgba(0, 85, 170, 0.3);
      position: relative;
      overflow: hidden;
    }

    .course-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.25);
      transition: left 0.4s ease;
    }

    .course-button:hover::before {
      left: 0;
    }

    .course-button:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 12px 25px rgba(0, 85, 170, 0.45);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .semester-block {
        width: 100%;
        max-width: 420px;
      }

      .logo {
        height: 45px;
        top: 15px;
        right: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="top-header">
    Course Guide
  </div>

  <h1>B Tech - Materials Engineering</h1>

  <!-- First Row: Semester I and III -->
  <div class="grid-row">
    <div class="semester-block">
      <div class="semester-title">Semester II</div>
      <div class="course-buttons">
        <a class="course-button" href="Data Structures and Algorithms.html" target="_blank">Data Structures and Algorithms</a>
        <a class="course-button" href="Linear Algebra and Differential Equations - Copy.html" target="_blank">Linear Algebra and Differential Equations</a>
        <a class="course-button" href="Basic Cognitive Psychology.html" target="_blank">Basic Cognitive Psychology</a>
        <a class="course-button" href="Society, Culture, and Human Behaviour.html" target="_blank">Society, Culture, and Human Behaviour</a>
        <a class="course-button" href="Introduction to Psychology.html" target="_blank">Introduction to Psychology</a>
        <a class="course-button" href="Introduction to Humanities.html" target="_blank">Introduction to Humanities</a>
        <a class="course-button" href="Environment and Ecology.html" target="_blank">Environment and Ecology</a>
        <a class="course-button" href="Design Thinking CSE UG.html" target="_blank">Design Thinking</a>
      </div>
    </div>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semester Courses</title>
  <style>
    @keyframes slideDown {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .top-header {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 20px 0;
      font-size: 28px;
      font-weight: bold;
      animation: slideDown 0.7s ease-out;
    }

    h1 {
      margin: 30px 0 10px;
      text-align: center;
      color: #2c3e50;
    }

    .grid-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      margin-bottom: 30px;
    }

    .semester-block {
      background-color: white;
      padding: 20px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }

    .semester-title {
      font-size: 22px;
      margin-bottom: 20px;
      color: #003366;
      text-align: center;
      font-weight: bold;
    }

    .course-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .course-button {
      background-color: #003366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
      width: 90%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    .course-button:hover {
      background-color: #002244;
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      .semester-block {
        width: 100%;
        max-width: 400px;
      }

      .grid-row {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="top-header">
    Course Guide
  </div>

  <h1>B Tech - Materials Engineering</h1>

  <!-- First Row: Semester I and III -->
  <div class="grid-row">
    <div class="semester-block">
      <div class="semester-title">Semester II</div>
      <div class="course-buttons">
        <a class="course-button" href="Data Structures and Algorithms.html" target="_blank">Data Structures and Algorithms</a>
        <a class="course-button" href="Linear Algebra and Differential Equations - Copy.html" target="_blank">Linear Algebra and Differential Equations</a>
        <a class="course-button" href="Basic Cognitive Psychology.html" target="_blank">Basic Cognitive Psychology</a>
        <a class="course-button" href="Society, Culture, and Human Behaviour.html" target="_blank">Society, Culture, and Human Behaviour</a>
        <a class="course-button" href="Introduction to Psychology.html" target="_blank">Introduction to Psychology</a>
        <a class="course-button" href="Introduction to Humanities.html" target="_blank">Introduction to Humanities</a>
        <a class="course-button" href="Environment and Ecology.html" target="_blank">Environment and Ecology</a>
        <a class="course-button" href="Design Thinking CSE UG.html" target="_blank">Design Thinking</a>
      </div>
    </div>
    
</body>
</html>
